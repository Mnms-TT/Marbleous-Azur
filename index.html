<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marbleous - Accueil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', sans-serif;
    }

    #game-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a15;
    }

    /* Même layout que game.html - avec colonne joueurs à droite */
    #game-container {
      aspect-ratio: 4 / 3;
      max-width: 100vw;
      max-height: 100vh;
      display: grid;
      grid-template-columns: 28% 52% 20%;
      grid-template-rows: 65% 35%;
      overflow: hidden;
    }

    @media (min-aspect-ratio: 4/3) {
      #game-container {
        height: 100vh;
        width: auto;
      }
    }

    @media (max-aspect-ratio: 4/3) {
      #game-container {
        width: 100vw;
        height: auto;
      }
    }

    /* Zone jeu solo (gauche) - même patchwork que game.html */
    #player-zone {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Patchwork orange généré par js/patchwork.js (var --patchwork-bg sur :root) */
    #player-zone::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      background-color: #F5983A;
      background-image: var(--patchwork-bg);
      background-size: 100% 100%;
      image-rendering: pixelated;
    }

    #player-zone>* {
      position: relative;
      z-index: 1;
    }

    #solo-area {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    #practice-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #practice-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: rgba(0, 0, 0, 0.6);
      cursor: pointer;
      transition: opacity 0.3s;
    }

    #practice-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #practice-overlay h2 {
      font-size: 20px;
      font-weight: bold;
      color: white;
      margin-bottom: 8px;
    }

    #practice-overlay p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 10px;
    }

    #practice-overlay small {
      font-size: 11px;
      color: #fbbf24;
    }

    #btn-play {
      background: linear-gradient(to bottom, #22c55e, #16a34a);
      border: 2px solid #4ade80;
      color: white;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    #btn-play:hover {
      background: #16a34a;
    }

    /* Barre de sorts — identique à game.html */
    #spells-bar {
      height: 42px;
      background: #0c1445;
      display: flex;
      align-items: center;
      padding: 2px 4px;
      gap: 3px;
      border-top: 2px solid #1e3a5f;
    }

    #spells-bar .spell-label {
      color: #94a3b8;
      font-size: 9px;
      font-weight: bold;
      margin-right: 4px;
      white-space: nowrap;
    }

    .spell-slot {
      width: 38px;
      height: 38px;
      min-width: 38px;
      background: transparent;
      border: 2px solid transparent;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spell-slot.active-spell {
      border: 2px solid #fff;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    /* Zone salles (droite) - comme adversaires dans game.html */
    #rooms-zone {
      grid-column: 2;
      grid-row: 1;
      background: linear-gradient(180deg, #1e3a8a 0%, #0c1445 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #rooms-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid #3b82f6;
    }

    #rooms-header span {
      font-size: 12px;
      color: #93c5fd;
    }

    #rooms-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 6px;
      padding: 8px;
      overflow: hidden;
    }

    .room-card {
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
      border: 2px solid #3b82f6;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }

    .room-card:hover {
      transform: scale(1.03);
      border-color: #60a5fa;
    }

    .room-card.active {
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      border-color: #fdba74;
    }

    .room-card h4 {
      font-size: 11px;
      font-weight: bold;
      color: white;
    }

    .room-card .count {
      font-size: 14px;
      font-weight: bold;
      color: #fbbf24;
    }

    .room-card.full {
      background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 100%);
      border-color: #f87171;
      cursor: not-allowed;
    }

    /* Zone joueurs connectés (droite) */
    #players-zone {
      grid-column: 3;
      grid-row: 1;
      background: linear-gradient(180deg, #1a1035 0%, #0d0a1a 100%);
      display: flex;
      flex-direction: column;
      border-left: 2px solid #7c3aed;
      overflow: hidden;
    }

    #players-header {
      padding: 8px 12px;
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      border-bottom: 1px solid #a78bfa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #players-header h3 {
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      margin: 0;
    }

    #players-header .count-badge {
      background: rgba(255, 255, 255, 0.2);
      color: #e9d5ff;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 10px;
    }

    #players-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .player-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .player-item:hover {
      background: rgba(124, 58, 237, 0.25);
      border-color: #a78bfa;
    }

    .player-avatar {
      font-size: 16px;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .player-info {
      flex: 1;
      min-width: 0;
    }

    .player-item .player-name {
      color: #e2e8f0;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .player-item .player-location {
      font-size: 9px;
      color: #a78bfa;
      white-space: nowrap;
    }

    .player-item .player-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 4px #22c55e;
      flex-shrink: 0;
    }

    /* Zone chat (bas, pleine largeur - 3 colonnes) */
    #chat-zone {
      grid-column: 1 / 4;
      grid-row: 2;
      background: linear-gradient(180deg, #1e3a8a 0%, #0c1445 100%);
      display: flex;
      flex-direction: column;
      border-top: 2px solid #3b82f6;
    }

    #chat-header {
      display: flex;
      justify-content: space-between;
      padding: 4px 12px;
      background: rgba(0, 0, 0, 0.3);
      font-size: 12px;
      color: #93c5fd;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-size: 12px;
    }

    .chat-msg {
      margin-bottom: 3px;
    }

    .chat-msg .author {
      color: #fbbf24;
      font-weight: bold;
    }

    .chat-msg .text {
      color: #e2e8f0;
    }

    .chat-msg.dm {
      color: #a855f7;
      font-style: italic;
    }

    .chat-msg.dm .author {
      color: #c084fc;
    }

    .chat-msg.dm .text {
      color: #a855f7;
    }

    #chat-input-area {
      display: flex;
      gap: 8px;
      padding: 8px;
      border-top: 1px solid #3b82f6;
    }

    #chat-input {
      flex: 1;
      background: #1e3a8a;
      border: 1px solid #3b82f6;
      color: white;
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 4px;
    }

    #btn-send {
      background: #f97316;
      border: none;
      color: white;
      padding: 8px 16px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Boîte pseudo dans l'en-tête des salles */
    #rooms-header .pseudo-edit {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #93c5fd;
    }

    #pseudo-box {
      width: 110px;
      background: #1e3a8a;
      border: 1px solid #3b82f6;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      padding: 3px 8px;
      text-align: center;
    }

    #pseudo-box:focus {
      outline: none;
      border-color: #f97316;
    }

    /* Classement global : panneau fixe dans la bande gauche, hors du
       conteneur 4:3 — ne modifie aucune dimension existante */
    #leaderboard-panel {
      position: fixed;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 172px;
      max-height: 72vh;
      background: linear-gradient(180deg, #14532d 0%, #052e16 100%);
      border: 2px solid #f59e0b;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 40;
    }

    #leaderboard-title {
      background: rgba(0, 0, 0, 0.35);
      color: #fbbf24;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: center;
      padding: 7px 4px;
      border-bottom: 1px solid #f59e0b;
    }

    #leaderboard-list {
      overflow-y: auto;
      padding: 5px;
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 11px;
      color: #d1fae5;
    }

    .lb-row:nth-child(odd) {
      background: rgba(255, 255, 255, 0.06);
    }

    .lb-rank {
      width: 16px;
      color: #fbbf24;
      font-weight: bold;
      flex-shrink: 0;
    }

    .lb-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }

    .lb-wins {
      color: #fbbf24;
      font-weight: bold;
      flex-shrink: 0;
    }

    .lb-score {
      color: #86efac;
      font-size: 10px;
      flex-shrink: 0;
    }

    .lb-empty {
      color: #6ee7b7;
      font-size: 11px;
      text-align: center;
      padding: 14px 6px;
    }

    /* Écran trop étroit : le panneau chevaucherait le jeu, on le masque */
    @media (max-width: 1180px) {
      #leaderboard-panel {
        display: none;
      }
    }
  </style>
</head>

<body>
  <!-- Classement global (bande gauche, hors du conteneur de jeu) -->
  <div id="leaderboard-panel">
    <div id="leaderboard-title">🏆 CLASSEMENT</div>
    <div id="leaderboard-list">
      <div class="lb-empty">Aucune partie jouée</div>
    </div>
  </div>

  <div id="game-wrapper">
    <div id="game-container">
      <!-- Zone solo (comme player-zone dans game.html) -->
      <div id="player-zone">
        <div id="solo-area">
          <canvas id="practice-canvas"></canvas>
          <div id="practice-overlay">
            <h2>🎯 Échauffement</h2>
            <p>Cliquez pour jouer en solo<br>
              <span style="font-size:11px;opacity:0.8">←→ : viser · Espace/↑ : tirer · Clic : lancer un sort sur soi</span>
            </p>
            <small id="welcome-pseudo"></small>
          </div>
        </div>
        <div id="spells-bar">
          <span class="spell-label">SORTILEGES</span>
          <div class="spell-slot"></div>
          <div class="spell-slot"></div>
          <div class="spell-slot"></div>
          <div class="spell-slot"></div>
          <div class="spell-slot"></div>
          <div class="spell-slot"></div>
          <div class="spell-slot"></div>
        </div>
      </div>

      <!-- Zone salles (comme opponents-zone dans game.html) -->
      <div id="rooms-zone">
        <div id="rooms-header">
          <span>accueil</span>
          <span class="pseudo-edit">✏️
            <input type="text" id="pseudo-box" maxlength="15" title="Changer de pseudo (Entrée pour valider)">
          </span>
          <span id="online-count">0 en ligne</span>
        </div>
        <div id="rooms-grid"></div>
      </div>

      <!-- Zone joueurs connectés -->
      <div id="players-zone">
        <div id="players-header">
          <h3>🎮 En ligne</h3>
          <span class="count-badge" id="player-count-badge">0</span>
          <button id="btn-history" title="Historique des connexions"
            style="margin-left:auto;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;font-size:12px;padding:2px 8px;cursor:pointer;">🕐</button>
        </div>
        <div id="players-list">
          <!-- Rempli dynamiquement -->
        </div>
      </div>

      <!-- Chat global -->
      <div id="chat-zone">
        <div id="chat-header">
          <span>Chat global</span>
        </div>
        <div id="chat-messages">
          <!-- Messages chargés dynamiquement - pas d'historique pour les nouveaux joueurs -->

        </div>
        <div id="chat-input-area">
          <input type="text" id="chat-input" placeholder="Écrire un message...">
          <button id="btn-send">Envoyer</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, writeBatch, addDoc, orderBy, query, limit, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getDatabase, ref as dbRef, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { LobbyGame } from "./js/lobbyGame.js";
    import { applyPatchworkBackground } from "./js/patchwork.js";

    // Fond patchwork orange identique à game.html
    applyPatchworkBackground();

    const firebaseConfig = {
      apiKey: "AIzaSyCIMWeeRs9ZWh8izEtzV_P53ar95mNqZOw",
      authDomain: "marbleous-azur.firebaseapp.com",
      projectId: "marbleous-azur",
      storageBucket: "marbleous-azur.appspot.com",
      messagingSenderId: "297375682236",
      appId: "1:297375682236:web:765a8de117fdf961cdcab9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    // État de jeu (occupation des salles) : Realtime Database
    const rtdb = getDatabase(app, "https://marbleous-azur-default-rtdb.europe-west1.firebasedatabase.app");
    const auth = getAuth(app);

    const INACTIVITY_THRESHOLD = 60000;
    const MAX_ROOMS = 10;
    const MAX_PLAYERS_PER_ROOM = 10;

    const roomsGrid = document.getElementById('rooms-grid');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const btnSend = document.getElementById('btn-send');
    const onlineCount = document.getElementById('online-count');
    const pseudoBox = document.getElementById('pseudo-box');
    const practiceOverlay = document.getElementById('practice-overlay');
    const practiceCanvas = document.getElementById('practice-canvas');
    const welcomePseudo = document.getElementById('welcome-pseudo');

    const activePlayersCache = new Map();
    const playerUnsubscribers = new Map();
    let totalOnline = 0;
    let myLobbyDocRef = null;
    let currentPseudo = '';

    // Stockage de tous les joueurs pour la liste
    const lobbyPlayers = new Map();
    const roomPlayers = new Map(); // roomId -> Map
    const allOnlinePlayers = new Map();

    // Temps de connexion pour filtrer le chat (ne pas afficher l'historique)
    let connectionTime = Date.now();

    // Historique des connexions (outil 🕐)
    let connectionLogged = false;
    let historyMode = false;
    let connectionLog = [];

    // Plus d'écran de saisie : pseudo depuis le stockage, sinon généré.
    // Modifiable à tout moment via la petite boîte de l'en-tête des salles.
    try {
      currentPseudo = (localStorage.getItem('marbleous_pseudo') || '').trim();
    } catch (e) {
      console.warn("Storage access restricted:", e);
    }
    if (!currentPseudo || currentPseudo.length < 2) {
      currentPseudo = 'Joueur' + (100 + Math.floor(Math.random() * 900));
      try { localStorage.setItem('marbleous_pseudo', currentPseudo); } catch (e) { /* ignore */ }
    }
    if (pseudoBox) pseudoBox.value = currentPseudo;
    if (welcomePseudo) welcomePseudo.textContent = `Bienvenue, ${currentPseudo} !`;

    signInAnonymously(auth).catch(console.error);

    // Entrée directe dans le lobby (registerInLobby ré-essaie tant que l'auth n'est pas prête)
    connectionTime = Date.now();
    registerInLobby();

    // Changement de pseudo via la boîte (Entrée ou perte de focus)
    function applyPseudoChange() {
      if (!pseudoBox) return;
      const v = (pseudoBox.value || '').trim().slice(0, 15);
      if (v.length < 2 || v === currentPseudo) {
        pseudoBox.value = currentPseudo;
        return;
      }
      currentPseudo = v;
      pseudoBox.value = currentPseudo;
      try { localStorage.setItem('marbleous_pseudo', currentPseudo); } catch (e) { /* ignore */ }
      if (welcomePseudo) welcomePseudo.textContent = `Bienvenue, ${currentPseudo} !`;

      // Mise à jour immédiate : présence lobby + jeu d'échauffement
      if (myLobbyDocRef && auth.currentUser) {
        setDoc(myLobbyDocRef, {
          name: currentPseudo,
          lastActive: Date.now(),
          uid: auth.currentUser.uid
        }, { merge: true }).catch(console.error);
      }
      LobbyGame.playerName = currentPseudo;
    }

    if (pseudoBox) {
      pseudoBox.addEventListener('keydown', e => {
        if (e.key === 'Enter') { applyPseudoChange(); pseudoBox.blur(); }
        e.stopPropagation(); // ne pas tirer dans le jeu d'échauffement en tapant
      });
      pseudoBox.addEventListener('blur', applyPseudoChange);
    }

    // Inscription dans le lobby (collection lobbyPlayers)
    async function registerInLobby() {
      if (!auth.currentUser) {
        console.warn("Retrying registration: auth not ready");
        setTimeout(registerInLobby, 500);
        return;
      }

      myLobbyDocRef = doc(db, "lobbyPlayers", auth.currentUser.uid);

      await setDoc(myLobbyDocRef, {
        name: currentPseudo,
        lastActive: Date.now(),
        uid: auth.currentUser.uid
      });

      // Journal des connexions (une entrée par session)
      if (!connectionLogged) {
        connectionLogged = true;
        addDoc(collection(db, "connectionLog"), {
          name: currentPseudo,
          uid: auth.currentUser.uid,
          ts: Date.now()
        }).catch(console.error);
      }

      // Heartbeat pour rester actif
      setInterval(async () => {
        if (myLobbyDocRef) {
          await setDoc(myLobbyDocRef, {
            name: currentPseudo,
            lastActive: Date.now(),
            uid: auth.currentUser.uid
          }, { merge: true });
        }
      }, 10000);

      // Écouter tous les joueurs du lobby
      listenToLobbyPlayers();
    }

    // Écouter les joueurs dans le lobby
    function listenToLobbyPlayers() {
      const lobbyRef = collection(db, "lobbyPlayers");

      onSnapshot(lobbyRef, (snapshot) => {
        const now = Date.now();
        lobbyPlayers.clear();

        snapshot.docs.forEach(playerDoc => {
          const data = playerDoc.data();
          if (now - (data.lastActive || 0) < INACTIVITY_THRESHOLD) {
            lobbyPlayers.set(playerDoc.id, {
              name: data.name || 'Joueur',
              lastActive: data.lastActive
            });
          }
        });

        updateOnlineCount();
      });
    }

    // Nettoyage à la fermeture de la page
    window.addEventListener('beforeunload', async () => {
      if (myLobbyDocRef) {
        const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
        await deleteDoc(myLobbyDocRef);
      }
    });

    auth.onAuthStateChanged(user => {
      if (user) {
        // Si on a déjà une session active, s'inscrire directement
        if (currentPseudo) {
          registerInLobby();
        }
        initializeLobby();
        listenToChat();
        listenToConnectionLog();
        listenToLeaderboard();
      }
    });

    // Classement global : victoires puis meilleur score, top 10
    function listenToLeaderboard() {
      const list = document.getElementById('leaderboard-list');
      if (!list) return;
      const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

      onValue(dbRef(rtdb, 'leaderboard'), (snap) => {
        const entries = Object.values(snap.val() || {});
        entries.sort((a, b) =>
          (b.wins || 0) - (a.wins || 0) || (b.bestScore || 0) - (a.bestScore || 0)
        );
        const top = entries.slice(0, 10);

        if (top.length === 0) {
          list.innerHTML = '<div class="lb-empty">Aucune partie jouée</div>';
          return;
        }

        list.innerHTML = top.map((e, i) => `
          <div class="lb-row">
            <span class="lb-rank">${i + 1}</span>
            <span class="lb-name">${esc(e.name || 'Joueur')}</span>
            <span class="lb-wins">${e.wins || 0}🏆</span>
            <span class="lb-score">${e.bestScore || 0}</span>
          </div>`).join('');
      }, (err) => console.warn("leaderboard indisponible:", err?.message));
    }

    // Bascule joueurs en ligne / historique des connexions
    const btnHistory = document.getElementById('btn-history');
    if (btnHistory) {
      btnHistory.onclick = () => {
        historyMode = !historyMode;
        btnHistory.style.background = historyMode ? '#a78bfa' : 'rgba(255,255,255,0.15)';
        renderSidePanel();
      };
    }

    // Occupation des salles : UN seul listener RTDB sur le miroir léger
    // roomsMeta (nom + lastActive par joueur, sans les grilles)
    function initializeLobby() {
      onValue(dbRef(rtdb, 'roomsMeta'), (snap) => {
        const all = snap.val() || {};
        const now = Date.now();

        for (let i = 1; i <= MAX_ROOMS; i++) {
          const rid = `salle_${i}`;
          const playersObj = (all[rid] && all[rid].players) || {};
          const currentRoomPlayers = new Map();
          let activeCount = 0;

          for (const [pid, p] of Object.entries(playersObj)) {
            if (now - (p.lastActive || 0) < INACTIVITY_THRESHOLD) {
              activeCount++;
              currentRoomPlayers.set(pid, {
                name: p.name || 'Joueur',
                roomId: rid,
                lastActive: p.lastActive
              });
            }
          }

          roomPlayers.set(rid, currentRoomPlayers);
          activePlayersCache.set(rid, activeCount);
          updateRoomCard(rid, activeCount);
        }
        updateOnlineCount();
      }, (err) => console.warn("roomsMeta indisponible:", err?.message));
    }

    function updateRoomCard(roomId, playerCount) {
      let card = document.getElementById(`room-${roomId}`);
      const roomNumber = roomId.split('_')[1];

      if (!card) {
        card = document.createElement('div');
        card.id = `room-${roomId}`;
        card.className = 'room-card';
        roomsGrid.appendChild(card);
      }

      const isFull = playerCount >= MAX_PLAYERS_PER_ROOM;
      const hasPlayers = playerCount > 0;
      card.className = `room-card ${isFull ? 'full' : ''} ${hasPlayers ? 'active' : ''}`;
      card.innerHTML = `
        <h4>Salle ${roomNumber}</h4>
        <div class="count">${playerCount}/${MAX_PLAYERS_PER_ROOM}</div>
      `;
      card.onclick = isFull ? null : () => joinRoom(roomId);
    }

    function updateOnlineCount() {
      totalOnline = lobbyPlayers.size;
      activePlayersCache.forEach(count => totalOnline += count);
      onlineCount.textContent = `${totalOnline} en ligne`;

      // Mettre à jour allOnlinePlayers
      allOnlinePlayers.clear();
      lobbyPlayers.forEach((p, id) => allOnlinePlayers.set(id, p));
      roomPlayers.forEach(roomMap => {
        roomMap.forEach((p, id) => allOnlinePlayers.set(id, p));
      });

      renderSidePanel();
    }

    // Panneau latéral : joueurs en ligne OU historique des connexions
    function renderSidePanel() {
      if (historyMode) renderConnectionHistory();
      else updatePlayersList();
    }

    function listenToConnectionLog() {
      const q = query(collection(db, "connectionLog"), orderBy("ts", "desc"), limit(40));
      onSnapshot(q, (snapshot) => {
        connectionLog = snapshot.docs.map(d => d.data());
        if (historyMode) renderConnectionHistory();
      });
    }

    function formatConnectionTime(ts) {
      const d = new Date(ts);
      const hm = d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      const sameDay = d.toDateString() === new Date().toDateString();
      return sameDay ? hm : d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }) + ' ' + hm;
    }

    function renderConnectionHistory() {
      const playersList = document.getElementById('players-list');
      if (!playersList) return;

      if (connectionLog.length === 0) {
        playersList.innerHTML = '<div style="color:#a78bfa;font-size:11px;text-align:center;padding:20px;">Aucune connexion enregistrée</div>';
        return;
      }

      playersList.innerHTML =
        '<div style="color:#a78bfa;font-size:10px;font-weight:bold;text-transform:uppercase;padding:2px 4px 6px;">🕐 Dernières connexions</div>' +
        connectionLog.map(c => `
          <div class="player-item" style="cursor:default;">
            <span class="player-avatar">${getPlayerEmoji(c.uid || '?')}</span>
            <div class="player-info">
              <span class="player-name">${(c.name || 'Joueur')}</span>
              <span class="player-location">connecté à ${formatConnectionTime(c.ts)}</span>
            </div>
          </div>
        `).join('');
    }

    const PLAYER_EMOJIS = ['🐉', '🦉', '🦊', '🐻', '🐼', '🦁', '🐯', '🐵', '🦋', '🐺', '🦎', '🦅', '💥', '🔥', '⚡', '🌟'];

    function getPlayerEmoji(uid) {
      let hash = 0;
      for (let i = 0; i < uid.length; i++) hash = ((hash << 5) - hash) + uid.charCodeAt(i);
      return PLAYER_EMOJIS[Math.abs(hash) % PLAYER_EMOJIS.length];
    }

    function getPlayerLocation(playerId) {
      for (const [roomId, roomMap] of roomPlayers.entries()) {
        if (roomMap.has(playerId)) {
          return `Salle ${roomId.split('_')[1]}`;
        }
      }
      return 'Lobby';
    }

    function updatePlayersList() {
      const playersList = document.getElementById('players-list');
      const countBadge = document.getElementById('player-count-badge');
      if (!playersList) return;

      const players = [];
      allOnlinePlayers.forEach((player, id) => {
        const myUid = auth.currentUser ? auth.currentUser.uid : null;
        if (myUid && id === myUid) return;
        players.push({ id, ...player });
      });

      if (countBadge) countBadge.textContent = players.length;

      if (players.length === 0) {
        playersList.innerHTML = '<div style="color:#a78bfa;font-size:11px;text-align:center;padding:20px;">Personne d\'autre en ligne 😴</div>';
        return;
      }

      playersList.innerHTML = players.map(p => {
        const emoji = getPlayerEmoji(p.id);
        const location = getPlayerLocation(p.id);
        const locationColor = location === 'Lobby' ? '#a78bfa' : '#fbbf24';
        return `
          <div class="player-item" onclick="openDM('${p.id}', '${(p.name || 'Joueur').replace(/'/g, "\\'")}')">
            <span class="player-avatar">${emoji}</span>
            <div class="player-info">
              <span class="player-name">${p.name || 'Joueur'}</span>
              <span class="player-location" style="color:${locationColor}">${location}</span>
            </div>
            <div class="player-dot"></div>
          </div>
        `;
      }).join('');
    }


    function joinRoom(roomId) {
      if (!auth.currentUser) {
        alert("Non connecté. Rafraîchissez.");
        return;
      }
      const pseudo = currentPseudo || 'Joueur';
      window.location.href = `game.html?roomId=${roomId}&name=${encodeURIComponent(pseudo)}`;
    }

    // Clic sur la zone d'échauffement pour jouer en solo
    if (practiceOverlay && practiceCanvas) {
      // Initialiser le module de jeu solo
      LobbyGame.init(practiceCanvas);

      practiceOverlay.onclick = () => {
        practiceOverlay.classList.add('hidden');
        LobbyGame.start();
      };
    }

    // Chat global

    function listenToChat() {
      const chatRef = collection(db, "globalChat");
      const q = query(chatRef, orderBy("timestamp", "desc"), limit(50));

      // Afficher message de bienvenue local
      chatMessages.innerHTML = '<div class="chat-msg"><span class="author">Système:</span> <span class="text">Bienvenue ! Cliquez sur une salle pour rejoindre.</span></div>';

      onSnapshot(q, (snapshot) => {
        const msgs = [];
        const myUid = auth.currentUser?.uid;

        snapshot.docs.forEach(doc => {
          const m = doc.data();
          // Filtrer: afficher seulement les messages reçus APRÈS notre connexion
          if (m.timestamp && m.timestamp < connectionTime) return;

          // Afficher si: message public OU je suis l'expéditeur OU je suis le destinataire
          if (!m.toUid || m.uid === myUid || m.toUid === myUid) {
            msgs.unshift(m);
          }
        });

        // Garder le message système de bienvenue + les nouveaux messages
        const welcomeMsg = '<div class="chat-msg"><span class="author">Système:</span> <span class="text">Bienvenue ! Cliquez sur une salle pour rejoindre.</span></div>';
        const newMsgs = msgs.map(m => {
          const isWhisper = m.toUid;
          const dmClass = isWhisper ? ' dm' : '';
          const prefix = isWhisper ? `[DM ${m.toName ? 'à ' + m.toName : ''}] ` : '';
          return `<div class="chat-msg${dmClass}"><span class="author">${m.author}:</span> <span class="text">${prefix}${m.text}</span></div>`;
        }).join('');

        chatMessages.innerHTML = welcomeMsg + newMsgs;
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });
    }

    // Message système local (non envoyé sur Firestore)
    function addLocalSystemMessage(msg) {
      chatMessages.innerHTML += `<div class="chat-msg"><span class="author">Système:</span> <span class="text">${msg}</span></div>`;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage() {
      let text = chatInput.value.trim();
      if (!text || !auth.currentUser) return;

      // Commandes locales pour l'échauffement : /fps X et /canon X (comme en salle)
      if (text.toLowerCase().startsWith('/fps ')) {
        const val = parseInt(text.split(' ')[1]);
        addLocalSystemMessage(LobbyGame.setFps(val)
          ? `FPS réglés à ${val} — vitesse du jeu d'échauffement`
          : 'FPS doit être entre 30 et 300');
        chatInput.value = '';
        return;
      }
      if (text.toLowerCase().startsWith('/canon ')) {
        const val = parseFloat(text.split(' ')[1]);
        addLocalSystemMessage(LobbyGame.setCannonSpeed(val)
          ? `Vitesse canon réglée à ${val}`
          : 'Valeur canon invalide');
        chatInput.value = '';
        return;
      }

      const author = currentPseudo || 'Joueur';
      let toUid = null;
      let toName = null;

      // Check for /pseudo command
      if (text.startsWith('/')) {
        const spaceIndex = text.indexOf(' ');
        if (spaceIndex > 1) {
          const targetPseudo = text.substring(1, spaceIndex);
          const messageText = text.substring(spaceIndex + 1).trim();

          // Chercher le joueur par pseudo
          let foundPlayer = null;
          allOnlinePlayers.forEach((player, id) => {
            if (player.name.toLowerCase() === targetPseudo.toLowerCase()) {
              foundPlayer = { id, ...player };
            }
          });

          if (foundPlayer) {
            toUid = foundPlayer.id;
            toName = foundPlayer.name;
            text = messageText;
          } else {
            alert(`Joueur "${targetPseudo}" non trouvé.`);
            return;
          }
        }
      }

      try {
        const msgData = {
          author, text,
          timestamp: Date.now(),
          uid: auth.currentUser.uid
        };

        if (toUid) {
          msgData.toUid = toUid;
          msgData.toName = toName;
        }

        await addDoc(collection(db, "globalChat"), msgData);
        chatInput.value = '';
      } catch (e) { console.error(e); }
    }

    // Clic sur un joueur : pré-remplit la commande MP "/Pseudo " dans le chat
    window.openDM = function (playerId, playerName) {
      if (!playerName) {
        const p = allOnlinePlayers.get(playerId);
        playerName = p ? p.name : 'Joueur';
      }
      chatInput.value = `/${playerName} `;
      chatInput.focus();
    };

    btnSend.onclick = sendMessage;
    chatInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
    // Signal that script loaded correctly
    window.lobbyScriptLoaded = true;
    console.log("Lobby script initialized successfully.");
  </script>

  <script>
    // Détection de secours si le module principal n'a pas chargé
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (!window.lobbyScriptLoaded) {
          console.error("Critical: Lobby script failed to load. Check for 404s or script errors.");
          const chat = document.getElementById('chat-messages');
          if (chat) {
            chat.innerHTML = '<div class="chat-msg"><span class="author">Système:</span> <span class="text">Le script du jeu n\'a pas pu se charger. Faites un rechargement forcé (Cmd+Maj+R ou Ctrl+F5).</span></div>';
          }
        }
      }, 1500);
    });
  </script>
</body>
